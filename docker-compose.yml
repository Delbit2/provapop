version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: enem-brasil-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-enem_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-enem_password}
      POSTGRES_DB: ${POSTGRES_DB:-enem_brasil}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-enem_user} -d ${POSTGRES_DB:-enem_brasil}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - enem-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enem-brasil-backend
    environment:
      # Flask
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-enem_user}:${POSTGRES_PASSWORD:-enem_password}@db:5432/${POSTGRES_DB:-enem_brasil}
      
      # Google Sheets
      GOOGLE_SHEETS_URL: ${GOOGLE_SHEETS_URL:-}
      GOOGLE_SHEETS_CREDENTIALS_FILE: /app/credentials.json
      GOOGLE_SHEETS_WORKSHEET_NAME: ${GOOGLE_SHEETS_WORKSHEET_NAME:-Ranking}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:3000}
    volumes:
      # Montar credentials.json (se existir) - opcional
      - ./backend/credentials.json:/app/credentials.json:ro
      # Persistir banco de dados SQLite (se não usar PostgreSQL)
      - backend_instance:/app/instance
      # Persistir migrations
      - backend_migrations:/app/migrations
    # Não falhar se credentials.json não existir
    init: true
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - enem-network
    restart: unless-stopped
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running migrations...' &&
        flask db upgrade &&
        echo 'Starting application...' &&
        gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 --access-logfile - --error-logfile - app:app
      "

volumes:
  postgres_data:
    driver: local
  backend_instance:
    driver: local
  backend_migrations:
    driver: local

networks:
  enem-network:
    driver: bridge
