<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minha Jornada - ProvaPop!</title>
    <style>
        /* =========================================
           RESET BÁSICO E VARIÁVEIS DE COR
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-color: #121212; /* Fundo escuro estilo app de música */
            --card-bg: #1e1e1e; /* Fundo dos elementos */
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --fire-color: #ff5722; /* Laranja do foguinho */
            --music-color: #bb86fc; /* Roxo estilo pop/neon */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            /* Evita que o app fique rolando para os lados no celular */
            overflow-x: hidden; 
            padding: 20px;
        }

        /* =========================================
           ESTILOS DO HEADER (TAREFA 1.1)
           ========================================= */
        .jornada-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-bg);
            padding: 15px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
        }

        .status-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .status-badge .icon {
            font-size: 28px;
            margin-bottom: 4px;
        }

        .status-badge .value {
            font-size: 20px;
            font-weight: bold;
        }

        .status-badge .label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Destaque de cores para os números */
        .ofensiva-value {
            color: var(--fire-color);
        }

        .obras-value {
            color: var(--music-color);
        }

        /* Título da Página (Opcional, mas bom para contexto) */
        .page-title {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <h1 class="page-title">Minha Jornada</h1>

    <!-- TAREFA 1.1: O HEADER DE STATUS -->
    <header class="jornada-header">
        
        <!-- Bloco 1: Ofensiva Diária -->
        <div class="status-badge">
            <div class="icon">🔥</div>
            <div class="value ofensiva-value">3</div>
            <div class="label">Dias Seguidos</div>
        </div>

        <!-- Bloco 2: Obras Descobertas -->
        <div class="status-badge">
            <div class="icon">🎵</div>
            <div class="value obras-value">12</div>
            <div class="label">Obras Descobertas</div>
        </div>

    </header>

    <!-- As próximas tarefas (Barra de progresso, Vinis, Acervo) entrarão aqui depois -->

</body>
</html>
