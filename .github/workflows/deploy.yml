name: Deploy ProvaPop Fase 3

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Pegar o código do GitHub
      uses: actions/checkout@v4

    - name: 2. Preparar o ambiente Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 3. Instalar dependências e Gerar Build
      # 👇 ADICIONADO: Injetando as variáveis de ambiente no momento do build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      run: |
        npm install
        npm run build
        rm -rf node_modules 

    - name: 4. Enviar TUDO para o servidor VPS (ProvaPop)
      uses: appleboy/scp-action@master
      with:
        host: 76.13.162.112
        username: root
        password: ${{ secrets.VPS_PASSWORD }}
        port: 22
        source: "."
        target: "/var/www/provapop"

    - name: 5. Ligar os Motores do Jogo (Docker)
      uses: appleboy/ssh-action@master
      with:
        host: 76.13.162.112
        username: root
        password: ${{ secrets.VPS_PASSWORD }}
        port: 22
        script: |
          cd /var/www/provapop
          docker compose down || true
          docker compose up -d --build
          systemctl restart nginx
