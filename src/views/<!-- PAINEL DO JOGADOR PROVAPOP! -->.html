<!-- PAINEL DO JOGADOR PROVAPOP! -->
<div id="painel-provapop">
    
    <!-- Cabeçalho com o Status do Jogador -->
    <div id="status-jogador">
        <h2>Seu Progresso</h2>
        <p>🏆 Pontos: <span id="pontos-tela">0</span></p>
        <p>🔥 Ofensiva: <span id="foguinho-tela">0</span> dias</p>
    </div>

    <hr>

    <!-- Botões para escolher a Jornada -->
    <div id="jornadas">
        <h3>Escolha sua Missão de Hoje:</h3>
        
        <!-- Jornada Diária (ENEM) -->
        <button id="btn-jogar-diaria">
            Jogar Clássicas (ENEM)
            <br>
            <small><span id="restantes-diaria">5</span> questões restantes hoje</small>
        </button>

        <br><br>

        <!-- Jornada Temática (Semanal) -->
        <button id="btn-jogar-tematica">
            Evento: Da Terra à Lua
            <br>
            <small><span id="restantes-tematica">2</span> questões restantes hoje</small>
        </button>
    </div>

</div>
